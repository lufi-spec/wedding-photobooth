<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Wedding Photobooth</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- HOME -->

    <section id="homePage" class="page">

        <h1>MEIDY & RAIS</h1>

        <p>Wedding Photobooth</p>

        <button id="startBtn">

            MULAI FOTO

        </button>

    </section>



    <!-- CAMERA -->

    <section id="cameraPage" class="page hidden">

    <video id="camera" autoplay playsinline></video>

    <div id="countdown" class="hidden">3</div>

    <button id="captureBtn">
        📸 Ambil Foto
    </button>

</section>



    <!-- PREVIEW -->

    <section id="previewPage" class="page hidden">

        <canvas id="canvas"></canvas>

        <div class="menu">

            <button id="retakeBtn">

                Foto Lagi

            </button>

            <button id="printBtn">

                Print

            </button>

            <button id="qrBtn">
                Download
            </button>

        </div>

    </section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/canvasEngine.js"></script>
<script src="js/capture.js"></script>
<script src="js/camera.js"></script>
<script src="js/download.js"></script>
<script src="js/upload.js"></script>
<script src="js/print.js"></script>
<script src="js/app.js"></script>
<div id="qrPopup" class="hidden">

    <div class="qr-box">

        <h2>Scan QR untuk Download</h2>

        <div id="qrcode"></div>

        <p>Foto sudah tersimpan di Google Drive</p>

    </div>

</div>
</body>

</html>

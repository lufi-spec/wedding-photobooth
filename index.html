<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Wedding Photobooth</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- HOME -->

    <section id="homePage" class="page">

        <h1>MEIDY & RAIS</h1>

        <p>Wedding Photobooth</p>

        <button id="startBtn">

            MULAI FOTO

        </button>

    </section>



    <!-- CAMERA -->

    <section id="cameraPage" class="page hidden">

    <video id="camera" autoplay playsinline></video>

    <div id="countdown" class="hidden">3</div>

    <button id="captureBtn">
        📸 Ambil Foto
    </button>

</section>



    <!-- PREVIEW -->

    <section id="previewPage" class="page hidden">

        <canvas id="canvas"></canvas>

        <div class="menu">

            <button id="retakeBtn">

                Foto Lagi

            </button>

            <button id="printBtn">

                Print

            </button>

            <button id="qrBtn">

                QR Download

            </button>

        </div>

    </section>

<script src="js/canvasEngine.js"></script>
<script src="js/capture.js"></script>
<script src="js/camera.js"></script>
<script src="js/app.js"></script>

</body>

</html>
